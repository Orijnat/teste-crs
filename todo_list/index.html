<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
        table, th, tr{
            margin: auto;
            border: 3px solid black;
            background: #ADD8E6;
            
        }
        img{
            width: 120px;
        }
        #a{
            text-align: center;

        }

        .btn-concluido{
            background-color: green;
        }

    </style>
<body>
    <div>
        <h2 id="a">Tabela de Produtos</h2>
        <div>
            <h3>Deseja adicionar alguma tarefa?</h3>
            <form method="get" id="formulario">
                <input type="text" name="input" id="taskName" placeholder="digite o nome da tarefa"></input>
                <input type="text" name="input" id="taskDesc" placeholder="descreva a tarefa" value=""></input>
                <input type="number" name="input" id="Prioridade" placeholder="prioridade de 1-5" min="1" max="5">
                <input type="date" name="date" id="data">
                <button type="submit" >enviar</button>
            </form>
        </div>



        <button type="submit" id="teste"> aoaoa</button>

    <table id="tabela">
        <hr>
        <!-- começo da coluna-->
        <tr>
            <!-- comeco da linha-->
            <th>
                Nome da tarefa
            </th>

            <th>
                Descricao da Tarefa
            </th>
            
            <th>
                Prioridade
            </th>
            
            <th>
                Data de Criaçao
            </th>

            <th>
                Ações
            </th>

            <!-- final da  linha-->
        </tr>
        <!-- final da coluna-->

    </table>
    </div>

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel"> Digite os novos valores do campo selecionado </h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="get" id="formulario1">
                        <input type="text" name="input" id="editName" placeholder="digite o nome da tarefa"></input>
                        <input type="text" name="input" id="editDesc" placeholder="descreva a tarefa" value=""></input>
                        <input type="number" name="input" id="editPrioridade" placeholder="prioridade de 1-5" min="1" max="5">
                        <input type="date" name="date" id="editdata">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="submit" form="formulario1" class="btn btn-success btn-enviar">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

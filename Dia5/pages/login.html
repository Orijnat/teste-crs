<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            min-height: 100vh;
        }

        .brand-side {
            background: url('/Dia5/images/logo.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-login {
            background-color: #202024;
            border:solid 2px rgb(178, 34, 34);
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            
        }

        .form-label {
            color: #e1e1e6;
            font-weight: 500;
        }

        .form-control {
            background-color: #121214;
            border: 1px solid #323238;
            color: white;
            padding: 0.8rem;
        }

        .form-control:focus {
            background-color: #121214;
            border-color: red;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(130, 87, 229, 0.25);
        }

        .btn-purple {
            background-color: red;
            color: white;
            border: none;
            padding: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-purple:hover {
            background-color: red;
            color: white;
        }

        @media (max-width: 768px) {
            .brand-side { display: none; }
        }
    </style>
</head>
<body>

    <main class="container-fluid">

        <div class="row login-container">

            <div class="col-md-8 brand-side d-none d-md-flex">
            </div>

            <div class="col-md-4 d-flex align-items-center justify-content-center">  

                <div class="card-login shadow-lg">
                        <h3 class="mb-4 text-center">Acesse sua conta</h3>
                    
                    <form>


                        <div class="d-flex justify-content-between align-items-center mt-3" style="margin-left: 2vh; margin-right: 2vh;">

                            <button type="button" class="btn btn-outline-secondary border-0" style="background-color: #2B2B3B;"> <img src="/Dia3/images/icons8-google-60.svg" alt=""> Google </button>
                            <button type="button" class="btn btn-outline-secondary border-0" style="background-color: #2B2B3B;"> <img src="/Dia3/images/icons8-github(1).svg" alt=""> Github </button>

                        </div>

                        <div class="mb-3">
                            <label for="staticEmail" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="staticEmail" placeholder="exemplo@email.com">
                        </div>

                        <div class="mb-4">
                            <label for="inputPassword" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="inputPassword" placeholder="Sua senha">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-purple">Entrar</button>
                        </div>

                        <div class="mt-4 text-center">
                            <small style="color: #a8a8b3;">Esqueceu sua senha?</small>
                        </div>
                    </form>
                    

                    <div class="row" style="background-color: #2B2B3B; border-radius: 5px;">

                        <button type="button" class="btn btn-primary" style="background-color: #2B2B3B; border: none;"data-bs-toggle="modal" data-bs-target="#exampleModal">
                        Nao tem uma conta?<br>
                        Crie uma agora!
                        </button>

                        <div class="modal fade" id="exampleModal" tabindex="-1"  aria-labelledby="exampleModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                            <div class="modal-header" style="background-color: #2B2B3B;">
                                <h1 class="modal-title fs-5" id="exampleModalLabel" style="color: #9797A6" >Registre-se</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body" style="background-color: #2B2B3B;">
                                <div>
                                    <label for="name" class="form-label" style="color: #9797A6">Digite seu Nome</label>
                                    <input type="text" class="form-control" id="name" required placeholder="Digite o seu nome">
                                </div>

                                <div class="mb-3">
                                    <label for="staticEmail" class="form-label" style="color: #9797A6">E-mail</label>
                                    <input type="email" class="form-control" id="staticEmail" required placeholder="exemplo@email.com">
                                </div>

                                <div class="mb-4">
                                    <label for="inputPassword" class="form-label" style="color: #9797A6">Senha</label>
                                    <input type="password"  class="form-control" id="inputPassword" required placeholder="Sua senha">
                                </div>

                                <div class="mb-4">
                                    <label for="inputPassword" class="form-label" style="color: #9797A6">Confirme a sua senha</label>
                                    <input type="password" class="form-control" id="inputPassword" required placeholder="Reescreva a sua senha">
                                </div>
                                

                            </div>
                            <div class="modal-footer" style="background-color: #2B2B3B;">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Sair</button>
                                <button type="button" class="btn btn-primary" style="background-color: rgb(178, 34, 34); border:none; ">Registrar</button>
                            </div>
                            </div>
                        </div>
                        </div>

                        
                    </div>

                </div>
            </div>
        </div>























    

    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
